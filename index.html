<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ヴァリスフィア戦記">
<title>ヴァリスフィア戦記 - ブラウザRPG</title>
<style>
:root { --accent:#7dd3fc; --area-color:#1f4d2b; }
* { box-sizing:border-box; }
html,body { margin:0; padding:0; height:100%; font-family:-apple-system,"Hiragino Sans","Noto Sans JP",sans-serif; }
body {
  min-height:100vh;
  background: radial-gradient(circle at 20% 20%, #1b2a4a, #05070f 70%);
  color:#eef2ff;
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
}
#app { max-width:480px; margin:0 auto; padding:16px; min-height:100vh; display:flex; flex-direction:column; gap:12px; }
.glass {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.18);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px;
  padding: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.35);
}
h1,h2,h3 { margin:0 0 8px; }
.btn {
  display:inline-block; padding:10px 16px; margin:4px; border-radius:14px;
  background: linear-gradient(135deg, rgba(125,211,252,0.35), rgba(125,211,252,0.1));
  border:1px solid rgba(255,255,255,0.25);
  color:#eef2ff; font-size:14px; cursor:pointer; text-align:center; user-select:none;
  transition: transform 0.1s;
}
.btn:active { transform: scale(0.96); }
.btn[disabled] { opacity:0.35; pointer-events:none; }
.btn-row { display:flex; flex-wrap:wrap; gap:6px; }
.statbar { height:10px; border-radius:6px; background:rgba(255,255,255,0.15); overflow:hidden; margin:4px 0; }
.statbar > div { height:100%; border-radius:6px; }
.hp > div { background: linear-gradient(90deg,#4ade80,#22c55e); }
.mp > div { background: linear-gradient(90deg,#60a5fa,#3b82f6); }
.xp > div { background: linear-gradient(90deg,#fbbf24,#f59e0b); }
.grid { display:grid; gap:4px; margin:12px 0; }
.tile { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:8px; font-size:16px; background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.1); }
.tile.player { box-shadow: 0 0 0 2px var(--accent) inset; }
.tile.exit { background: rgba(125,211,252,0.25); }
.tile.boss { background: rgba(248,113,113,0.25); }
.log { font-size:13px; line-height:1.5; max-height:120px; overflow-y:auto; background:rgba(0,0,0,0.25); border-radius:12px; padding:8px; }
.jobcard { cursor:pointer; margin-bottom:10px; }
.jobcard.selected { box-shadow:0 0 0 2px var(--accent); }
.dpad { display:grid; grid-template-columns:56px 56px 56px; grid-template-rows:56px 56px 56px; gap:6px; justify-content:center; margin:8px auto; }
.center-text { text-align:center; }
small.dim { opacity:0.6; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const JOBS = {
  paladin: { key:'paladin', name:'ナイト', role:'タンク', baseHp:42, baseMp:12, baseAtk:8, baseDef:11,
    skills:[
      {name:'シールドバッシュ', mp:3, type:'phys', power:1.3, desc:'盾で殴りつける強打'},
      {name:'守護の陣', mp:6, type:'buffDef', power:5, desc:'防御力を大幅に高める'}
    ]},
  blackmage: { key:'blackmage', name:'黒魔道士', role:'魔法DPS', baseHp:24, baseMp:34, baseAtk:6, baseDef:3,
    skills:[
      {name:'ファイア', mp:6, type:'phys', power:2.0, desc:'火属性魔法で攻撃'},
      {name:'ブリザド', mp:6, type:'phys', power:1.8, desc:'氷属性魔法で攻撃'}
    ]},
  whitemage: { key:'whitemage', name:'白魔道士', role:'ヒーラー', baseHp:27, baseMp:30, baseAtk:4, baseDef:5,
    skills:[
      {name:'ケアル', mp:5, type:'heal', power:22, desc:'自身のHPを回復する'},
      {name:'プロテス', mp:7, type:'buffDef', power:4, desc:'防御力を高める'}
    ]},
  dragoon: { key:'dragoon', name:'竜騎士', role:'物理DPS', baseHp:33, baseMp:14, baseAtk:11, baseDef:6,
    skills:[
      {name:'ジャンプ', mp:5, type:'phys', power:1.6, desc:'高々度から急襲する'},
      {name:'渾身の一突き', mp:8, type:'phys', power:2.1, desc:'力を込めた一突き'}
    ]},
  bard: { key:'bard', name:'吟遊詩人', role:'物理DPS', baseHp:29, baseMp:20, baseAtk:8, baseDef:5,
    skills:[
      {name:'ストレートショット', mp:4, type:'phys', power:1.4, desc:'矢による狙撃'},
      {name:'戦いの詩', mp:6, type:'buffAtk', power:3, desc:'攻撃力を高める詩を吟ずる'}
    ]},
  monk: { key:'monk', name:'モンク', role:'物理DPS', baseHp:35, baseMp:13, baseAtk:10, baseDef:5,
    skills:[
      {name:'双竜脚', mp:5, type:'phys', power:1.7, desc:'連続した蹴撃'},
      {name:'纏浪脚', mp:9, type:'phys', power:2.2, desc:'渾身の回転蹴り'}
    ]}
};

const AREAS = [
  { name:'ミストベールの森', emoji:'🌲', color:'#1f4d2b', w:6, h:5,
    enemies:[ {name:'ドードー',hp:16,atk:4,def:1,xp:9}, {name:'インプ',hp:13,atk:5,def:0,xp:8}, {name:'野生の狼',hp:18,atk:5,def:1,xp:10} ],
    boss:{name:'森の主 グリーンワイバーン', hp:65, atk:9, def:3, xp:55, emoji:'🐉'} },
  { name:'ラノシア高地', emoji:'⛰️', color:'#4d3b1f', w:7, h:5,
    enemies:[ {name:'サハギン戦士',hp:24,atk:7,def:2,xp:15}, {name:'ウルフ',hp:20,atk:8,def:1,xp:13}, {name:'岩ガニ',hp:28,atk:6,def:4,xp:16} ],
    boss:{name:'高地の覇者 バジリスク', hp:100, atk:13, def:5, xp:90, emoji:'🦎'} },
  { name:'天狐の遺跡', emoji:'🏛️', color:'#3b1f4d', w:7, h:6,
    enemies:[ {name:'ゴブリン術士',hp:30,atk:9,def:3,xp:22}, {name:'リッチ',hp:34,atk:11,def:2,xp:26}, {name:'石像騎士',hp:40,atk:10,def:6,xp:28} ],
    boss:{name:'遺跡の守護者 アラガントーテム', hp:150, atk:17, def:8, xp:160, emoji:'🗿'} }
];

let game = {
  screen:'title',
  player:null,
  areaIndex:0,
  pos:{x:0,y:0},
  bossDefeated:[false,false,false],
  battle:null,
  logMessages:[],
  selectedJob:null
};

function newPlayer(jobKey){
  const j = JOBS[jobKey];
  return {
    jobKey, name:j.name,
    level:1, xp:0, xpNext:20,
    maxHp:j.baseHp, hp:j.baseHp,
    maxMp:j.baseMp, mp:j.baseMp,
    atk:j.baseAtk, def:j.baseDef,
    buffAtk:0, buffDef:0,
    items:{ potion:3, ether:2 }
  };
}

function entrancePos(area){ return {x:0, y:Math.floor(area.h/2)}; }

function startGame(jobKey){
  game.player = newPlayer(jobKey);
  game.areaIndex = 0;
  game.pos = entrancePos(AREAS[0]);
  game.bossDefeated=[false,false,false];
  game.logMessages=[];
  game.screen='map';
  render();
}

function tileTypeAt(area, areaIdx, x, y){
  const midY = Math.floor(area.h/2);
  if (x===0 && y===midY && areaIdx>0) return 'exitPrev';
  if (x===area.w-1 && y===midY && areaIdx<AREAS.length-1) return 'exitNext';
  if (x===area.w-2 && y===0) return 'boss';
  return 'normal';
}

function addLog(msg){
  game.logMessages.unshift(msg);
  if (game.logMessages.length>30) game.logMessages.pop();
}

function movePlayer(dx,dy){
  if (game.screen!=='map') return;
  const area = AREAS[game.areaIndex];
  let nx = game.pos.x+dx, ny = game.pos.y+dy;
  if (nx<0||nx>=area.w||ny<0||ny>=area.h) return;
  game.pos = {x:nx,y:ny};
  const t = tileTypeAt(area, game.areaIndex, nx, ny);
  if (t==='exitNext'){
    if (!game.bossDefeated[game.areaIndex]){
      addLog('⚠️ このエリアのボスを倒すまで先には進めない。');
      render();
      return;
    }
    game.areaIndex++;
    game.pos = entrancePos(AREAS[game.areaIndex]);
    addLog(`🗺️ ${AREAS[game.areaIndex].name} に入った。`);
    render();
    return;
  }
  if (t==='exitPrev'){
    game.areaIndex--;
    game.pos = entrancePos(AREAS[game.areaIndex]);
    render();
    return;
  }
  if (t==='boss'){
    if (game.bossDefeated[game.areaIndex]){
      addLog('ここにはもう何もない。');
      render();
      return;
    }
    startBattle(area.boss, true);
    return;
  }
  if (Math.random() < 0.28){
    const pool = area.enemies;
    const e = pool[Math.floor(Math.random()*pool.length)];
    startBattle(e, false);
    return;
  }
  render();
}

function startBattle(enemyData, isBoss){
  game.battle = {
    enemy: Object.assign({}, enemyData, {curHp: enemyData.hp, maxHp: enemyData.hp}),
    isBoss,
    turnLog: [`⚔️ ${enemyData.name} が現れた！`],
    itemMenuOpen:false
  };
  game.screen='battle';
  render();
}

function playerTotalAtk(){ return game.player.atk + game.player.buffAtk; }
function playerTotalDef(){ return game.player.def + game.player.buffDef; }

function battleLog(msg){
  game.battle.turnLog.unshift(msg);
  if (game.battle.turnLog.length>20) game.battle.turnLog.pop();
}

function playerAttack(){
  if (!game.battle) return;
  const dmg = Math.max(1, Math.round(playerTotalAtk() - game.battle.enemy.def*0.6 + (Math.random()*4-2)));
  game.battle.enemy.curHp -= dmg;
  battleLog(`🗡️ ${game.player.name}の攻撃！ ${game.battle.enemy.name}に${dmg}ダメージ。`);
  afterPlayerAction();
}

function playerSkill(idx){
  if (!game.battle) return;
  const job = JOBS[game.player.jobKey];
  const skill = job.skills[idx];
  if (game.player.mp < skill.mp){
    battleLog('✋ MPが足りない！');
    render();
    return;
  }
  game.player.mp -= skill.mp;
  if (skill.type==='phys'){
    const dmg = Math.max(1, Math.round(playerTotalAtk()*skill.power - game.battle.enemy.def + (Math.random()*4-2)));
    game.battle.enemy.curHp -= dmg;
    battleLog(`✨ ${skill.name}！ ${game.battle.enemy.name}に${dmg}ダメージ。`);
  } else if (skill.type==='heal'){
    const heal = Math.min(game.player.maxHp-game.player.hp, skill.power);
    game.player.hp += heal;
    battleLog(`💚 ${skill.name}！ HPを${heal}回復した。`);
  } else if (skill.type==='buffDef'){
    game.player.buffDef += skill.power;
    battleLog(`🛡️ ${skill.name}！ 防御力が上がった。`);
  } else if (skill.type==='buffAtk'){
    game.player.buffAtk += skill.power;
    battleLog(`🔥 ${skill.name}！ 攻撃力が上がった。`);
  }
  afterPlayerAction();
}

function openItemMenu(){ game.battle.itemMenuOpen = true; render(); }
function closeItemMenu(){ game.battle.itemMenuOpen = false; render(); }

function useItem(type){
  if (!game.battle) return;
  if (type==='potion'){
    if (game.player.items.potion<=0){ battleLog('ポーションがない。'); render(); return; }
    game.player.items.potion--;
    const heal = Math.min(game.player.maxHp-game.player.hp, 25);
    game.player.hp += heal;
    battleLog(`🧪 ポーションを使った！ HPを${heal}回復。`);
  } else if (type==='ether'){
    if (game.player.items.ether<=0){ battleLog('エーテルがない。'); render(); return; }
    game.player.items.ether--;
    const restore = Math.min(game.player.maxMp-game.player.mp, 15);
    game.player.mp += restore;
    battleLog(`🧪 エーテルを使った！ MPを${restore}回復。`);
  }
  game.battle.itemMenuOpen=false;
  afterPlayerAction();
}

function playerFlee(){
  if (!game.battle) return;
  if (game.battle.isBoss){
    battleLog('🚫 ボスから逃げることはできない！');
    render();
    return;
  }
  if (Math.random()<0.6){
    battleLog('💨 うまく逃げ切った。');
    endBattle(false);
    return;
  } else {
    battleLog('逃げられなかった！');
    afterPlayerAction();
  }
}

function afterPlayerAction(){
  if (game.battle.enemy.curHp<=0){
    winBattle();
    return;
  }
  enemyTurn();
}

function enemyTurn(){
  const enemy = game.battle.enemy;
  const special = game.battle.isBoss && Math.random()<0.25;
  const dmg = Math.max(1, Math.round((enemy.atk*(special?1.6:1)) - playerTotalDef()*0.5 + (Math.random()*4-2)));
  game.player.hp -= dmg;
  battleLog(`${special?'💥 強力な攻撃！ ':''}${enemy.name}の攻撃！ ${dmg}ダメージを受けた。`);
  if (game.player.hp<=0){
    game.player.hp=0;
    game.screen='gameover';
    render();
    return;
  }
  render();
}

function winBattle(){
  const enemy = game.battle.enemy;
  const isBoss = game.battle.isBoss;
  battleLog(`🎉 ${enemy.name}を倒した！`);
  const xpGain = enemy.xp;
  game.player.xp += xpGain;
  battleLog(`✨ 経験値 ${xpGain} を獲得。`);
  if (isBoss){
    game.bossDefeated[game.areaIndex]=true;
    battleLog('🏆 エリアボスを撃破！');
  }
  while (game.player.xp >= game.player.xpNext){
    levelUp();
  }
  const finalBossCleared = game.areaIndex===AREAS.length-1 && isBoss;
  game.player.buffAtk=0; game.player.buffDef=0;
  game.battle=null;
  game.screen = finalBossCleared ? 'clear' : 'map';
  render();
}

function levelUp(){
  game.player.xp -= game.player.xpNext;
  game.player.level++;
  game.player.xpNext = Math.round(game.player.xpNext*1.4);
  game.player.maxHp += 7;
  game.player.maxMp += 5;
  game.player.atk += 2;
  game.player.def += 1;
  game.player.hp = game.player.maxHp;
  game.player.mp = game.player.maxMp;
  addLog(`⭐ レベルアップ！ Lv.${game.player.level}になった。`);
}

function endBattle(){
  game.player.buffAtk=0; game.player.buffDef=0;
  game.battle=null;
  game.screen='map';
  render();
}

function saveGame(){
  localStorage.setItem('ff14liteSave', JSON.stringify({
    player: game.player, areaIndex: game.areaIndex, pos: game.pos, bossDefeated: game.bossDefeated
  }));
  addLog('💾 セーブしました。');
  render();
}

function loadGame(){
  const raw = localStorage.getItem('ff14liteSave');
  if (!raw) return false;
  const data = JSON.parse(raw);
  game.player = data.player;
  game.areaIndex = data.areaIndex;
  game.pos = data.pos;
  game.bossDefeated = data.bossDefeated;
  game.screen='map';
  return true;
}

function render(){
  const app = document.getElementById('app');
  if (game.screen==='title') app.innerHTML = renderTitle();
  else if (game.screen==='jobSelect') app.innerHTML = renderJobSelect();
  else if (game.screen==='map') app.innerHTML = renderMap();
  else if (game.screen==='battle') app.innerHTML = renderBattle();
  else if (game.screen==='gameover') app.innerHTML = renderGameOver();
  else if (game.screen==='clear') app.innerHTML = renderClear();
}

function renderTitle(){
  const hasSave = !!localStorage.getItem('ff14liteSave');
  return `
  <div class="glass center-text">
    <h1>ヴァリスフィア戦記</h1>
    <p>ブラウザで動く簡易ジョブ制RPG</p>
    <div class="btn-row" style="justify-content:center">
      <div class="btn" onclick="game.screen='jobSelect'; render();">ゲーム開始</div>
      ${hasSave ? '<div class="btn" onclick="loadGame(); render();">続きから</div>' : ''}
    </div>
  </div>`;
}

function renderJobSelect(){
  const cards = Object.values(JOBS).map(j => `
    <div class="glass jobcard ${game.selectedJob===j.key?'selected':''}" onclick="game.selectedJob='${j.key}'; render();">
      <h3>${j.name} <small class="dim">(${j.role})</small></h3>
      <div style="font-size:13px;">HP ${j.baseHp} / MP ${j.baseMp} / ATK ${j.baseAtk} / DEF ${j.baseDef}</div>
      <div style="font-size:12px; margin-top:6px;" class="dim">${j.skills.map(s=>s.name).join(' / ')}</div>
    </div>`).join('');
  return `
  <div class="glass"><h2>ジョブを選択</h2><p class="dim">戦い方の異なる6つのジョブから選べる。</p></div>
  ${cards}
  <div class="btn-row" style="justify-content:center;">
    <div class="btn" ${game.selectedJob?'':'disabled'} onclick="if(game.selectedJob){startGame(game.selectedJob);}">冒険を始める</div>
  </div>`;
}

function renderMap(){
  const area = AREAS[game.areaIndex];
  let tiles='';
  for (let y=0;y<area.h;y++){
    for (let x=0;x<area.w;x++){
      const t = tileTypeAt(area, game.areaIndex, x, y);
      const isPlayer = (game.pos.x===x && game.pos.y===y);
      let cls='tile'; let content='・';
      if (t==='exitNext'||t==='exitPrev'){ cls+=' exit'; content = t==='exitNext'?'➡️':'⬅️'; }
      else if (t==='boss'){ cls+=' boss'; content = game.bossDefeated[game.areaIndex]?'✅':area.boss.emoji; }
      if (isPlayer){ cls+=' player'; content='🧍'; }
      tiles += `<div class="${cls}">${content}</div>`;
    }
  }
  const p = game.player;
  return `
  <div class="glass">
    <h2>${area.emoji} ${area.name}</h2>
    <div>Lv.${p.level} ${JOBS[p.jobKey].name}</div>
    <div class="statbar hp"><div style="width:${p.hp/p.maxHp*100}%"></div></div>
    <div style="font-size:12px;">HP ${p.hp}/${p.maxHp}</div>
    <div class="statbar mp"><div style="width:${p.mp/p.maxMp*100}%"></div></div>
    <div style="font-size:12px;">MP ${p.mp}/${p.maxMp}</div>
    <div class="statbar xp"><div style="width:${(p.xp/p.xpNext*100).toFixed(0)}%"></div></div>
    <div style="font-size:12px;">EXP ${p.xp}/${p.xpNext}</div>
  </div>
  <div class="glass">
    <div class="grid" style="grid-template-columns: repeat(${area.w}, 1fr);">${tiles}</div>
    <div class="dpad">
      <div></div><div class="btn" onclick="movePlayer(0,-1)">↑</div><div></div>
      <div class="btn" onclick="movePlayer(-1,0)">←</div><div class="btn" onclick="movePlayer(0,0)">探索</div><div class="btn" onclick="movePlayer(1,0)">→</div>
      <div></div><div class="btn" onclick="movePlayer(0,1)">↓</div><div></div>
    </div>
    <div class="btn-row" style="justify-content:center;">
      <div class="btn" onclick="saveGame()">💾 セーブ</div>
    </div>
  </div>
  <div class="glass">
    <h3>ログ</h3>
    <div class="log">${game.logMessages.map(l=>`<div>${l}</div>`).join('')}</div>
  </div>`;
}

function renderBattle(){
  const p = game.player;
  const b = game.battle;
  const e = b.enemy;
  const job = JOBS[p.jobKey];
  const skillButtons = job.skills.map((s,i)=>`<div class="btn" ${p.mp<s.mp?'disabled':''} onclick="playerSkill(${i})" title="${s.desc}">${s.name}<br><small class="dim">MP${s.mp}</small></div>`).join('');
  let actionArea;
  if (b.itemMenuOpen){
    actionArea = `
    <div class="btn-row">
      <div class="btn" onclick="useItem('potion')">🧪ポーション (${p.items.potion})</div>
      <div class="btn" onclick="useItem('ether')">🧪エーテル (${p.items.ether})</div>
      <div class="btn" onclick="closeItemMenu()">戻る</div>
    </div>`;
  } else {
    actionArea = `
    <div class="btn-row">
      <div class="btn" onclick="playerAttack()">攻撃</div>
      ${skillButtons}
      <div class="btn" onclick="openItemMenu()">道具</div>
      <div class="btn" onclick="playerFlee()">逃げる</div>
    </div>`;
  }
  return `
  <div class="glass">
    <h2>${b.isBoss?'👹 ボス戦':'⚔️ 戦闘'}</h2>
    <div><strong>${e.name}</strong> ${b.isBoss? '(ボス)':''}</div>
    <div class="statbar hp"><div style="width:${Math.max(0,e.curHp)/e.maxHp*100}%"></div></div>
    <div style="font-size:12px;">HP ${Math.max(0,e.curHp)}/${e.maxHp}</div>
  </div>
  <div class="glass">
    <div>${job.name} Lv.${p.level}</div>
    <div class="statbar hp"><div style="width:${Math.max(0,p.hp)/p.maxHp*100}%"></div></div>
    <div style="font-size:12px;">HP ${Math.max(0,p.hp)}/${p.maxHp}</div>
    <div class="statbar mp"><div style="width:${p.mp/p.maxMp*100}%"></div></div>
    <div style="font-size:12px;">MP ${p.mp}/${p.maxMp}</div>
  </div>
  <div class="glass">${actionArea}</div>
  <div class="glass"><h3>ログ</h3><div class="log">${b.turnLog.map(l=>`<div>${l}</div>`).join('')}</div></div>`;
}

function renderGameOver(){
  return `<div class="glass center-text">
    <h2>💀 ゲームオーバー</h2>
    <p>${game.player.name}は倒れてしまった…</p>
    <div class="btn" onclick="game.screen='title'; render();">タイトルへ戻る</div>
  </div>`;
}

function renderClear(){
  const p = game.player;
  return `<div class="glass center-text">
    <h2>🎉 クリア！</h2>
    <p>すべてのエリアのボスを撃破した！</p>
    <p>最終レベル: Lv.${p.level} (${JOBS[p.jobKey].name})</p>
    <div class="btn" onclick="localStorage.removeItem('ff14liteSave'); game.screen='title'; render();">タイトルへ戻る</div>
  </div>`;
}

document.addEventListener('keydown', (ev)=>{
  if (game.screen!=='map') return;
  if (ev.key==='ArrowUp') movePlayer(0,-1);
  else if (ev.key==='ArrowDown') movePlayer(0,1);
  else if (ev.key==='ArrowLeft') movePlayer(-1,0);
  else if (ev.key==='ArrowRight') movePlayer(1,0);
});

render();
</script>
</body>
</html>
